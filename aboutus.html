      💬
    </button>

      </div>
      <div class="p-4 border-t">

  <script>
    // Navbar Toggle
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    menuToggle.addEventListener('click', () => navMenu.classList.toggle('hidden'));

    // Chatbot Functionality
    const chatbotToggle = document.getElementById('chatbotToggle');
    const chatbotWindow = document.getElementById('chatbotWindow');
    const chatbotClose = document.getElementById('chatbotClose');
    const chatbotInput = document.getElementById('chatbotInput');
    const chatbotMessages = document.getElementById('chatbotMessages');

    chatbotToggle.addEventListener('click', () => chatbotWindow.classList.toggle('hidden'));
    chatbotClose.addEventListener('click', () => chatbotWindow.classList.add('hidden'));
    chatbotInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatbotInput.value.trim()) {
        const msg = chatbotInput.value;
        chatbotMessages.innerHTML += `<div class="chatbot-user chatbot-bubble">${msg}</div>`;
        chatbotInput.value = '';
        setTimeout(() => {
          chatbotMessages.innerHTML += `<div class="chatbot-bot chatbot-bubble">Thank you! Our team will reach out soon.</div>`;
          chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }, 800);
      }
    });
  </script>
